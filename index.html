<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 2026 Bali Turu</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .box {
        background: #1e1e1e;
        padding: 25px;
        border-radius: 15px;
        width: 320px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        text-align: center;
    }
    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #00c853;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background: #00a844;
    }
    .result {
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }
    .note {
        margin-top: 8px;
        font-size: 14px;
        color: #aaa;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Mart 2026 Bali Turu</h2>
    <input type="text" id="rupi" placeholder="Rupi gir">
    <button onclick="hesapla()">Hesapla</button>
    <div class="result" id="sonuc">Sonuç: -</div>
    <div class="note" id="not"></div>
</div>

<script>
const input = document.getElementById("rupi");

input.addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    value = Number(value).toLocaleString("tr-TR");
    e.target.value = value;
});

function hesapla() {
    let raw = document.getElementById("rupi").value.replace(/\./g, "");
    let rupi = Number(raw);
    let tl = rupi / 380;

    document.getElementById("sonuc").innerText =
        "Sonuç: " + tl.toLocaleString('tr-TR', {maximumFractionDigits: 0}) + " TL";

    let milyon = rupi / 1000000;
    let text = "";

    if (milyon >= 1) {
        text = milyon.toFixed(1) + " milyon rupi";
    } else {
        text = rupi.toLocaleString('tr-TR') + " rupi";
    }

    document.getElementById("not").innerText = text;
}
</script>

</body>
</html>
